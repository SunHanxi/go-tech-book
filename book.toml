[book]
title = "Go 底层原理与工程实践"
authors = ["拖泥带水"]
language = "zh-CN"
src = "."

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "light"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/SunHanxi/go-tech-book"
edit-url-template = "https://github.com/SunHanxi/go-tech-book/edit/main/{path}"
no-section-label = false

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
